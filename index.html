<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BME-Exam Developer | Red Theme</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
    </style>
</head>
<body class="min-h-screen text-gray-800">

    <nav class="bg-red-600 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <i class="fas fa-user-md text-2xl text-red-200"></i>
                    <div class="flex flex-col">
                        <h1 class="text-xl font-bold tracking-tight">BME-Exam Developer</h1>
                        <span class="text-[10px] text-red-100 tracking-widest font-semibold mt-0.5">Applied College, University of Tabuk | abaig@ut.edu.sa</span>
                    </div>
                </div>

                <div class="flex items-center space-x-3 bg-red-700/30 px-4 py-2 rounded-lg border border-red-500/30">
                    <div id="connectionStatus" class="w-3 h-3 rounded-full bg-red-400"></div>
                    <input type="password" id="apiKeyInput" placeholder="Enter API Key" 
                        class="bg-transparent border-none text-sm placeholder-red-200 text-white focus:outline-none w-32">
                    <button id="saveKeyBtn" class="text-xs font-medium hover:text-white text-red-100">Save</button>
                    <a href="https://aistudio.google.com/app/apikey" target="_blank" class="text-[10px] text-red-200 hover:text-white underline decoration-red-300">Get Key</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- Sidebar -->
        <div class="lg:col-span-4 space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 sticky top-6">
                <h2 class="text-lg font-semibold mb-4 flex items-center text-gray-700">
                    <i class="fas fa-cog text-red-500 mr-2"></i> Exam Parameters
                </h2>
                
                <div class="space-y-4">
                    <div>
                        <label for="subjectSelect" class="block text-sm font-medium text-gray-700 mb-1">Subject</label>
                        <select id="subjectSelect" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-red-500 outline-none bg-white">
                            <option value="Microbiology">Microbiology</option>
                            <option value="Anatomy">Anatomy</option>
                            <option value="Physiology">Physiology</option>
                            <option value="Pharmacology">Pharmacology</option>
                            <option value="Pathology">Pathology</option>
                            <option value="Biochemistry">Biochemistry</option>
                            <option value="Internal Medicine">Internal Medicine</option>
                            <option value="Pediatrics">Pediatrics</option>
                            <option value="Surgery">Surgery</option>
                            <option value="OB-GYN">Obstetrics & Gynecology</option>
                            <option value="Psychiatry">Psychiatry</option>
                            <option value="Public Health">Public Health</option>
                            <option value="Cardiology">Cardiology</option>
                            <option value="Neurology">Neurology</option>
                            <option value="Endocrinology">Endocrinology</option>
                            <option value="Ophthalmology">Ophthalmology</option>
                            <option value="Dermatology">Dermatology</option>
                            <option value="Radiology">Radiology</option>
                        </select>
                    </div>

                    <div>
                        <label for="topicInput" class="block text-sm font-medium text-gray-700 mb-1">Topic</label>
                        <input type="text" id="topicInput" placeholder="e.g., Virology, Heart Failure..." 
                            class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-red-500 outline-none">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label for="modeSelect" class="block text-sm font-medium text-gray-700 mb-1">Mode</label>
                            <select id="modeSelect" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-red-500 outline-none bg-white">
                                <option value="OBA">MCQs (OBA)</option>
                                <option value="SEQ">Short Essay (SEQ)</option>
                            </select>
                        </div>
                        <div>
                            <label for="levelSelect" class="block text-sm font-medium text-gray-700 mb-1">Complexity</label>
                            <select id="levelSelect" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-red-500 outline-none bg-white">
                                <option value="1st order (direct recall)">1st order (direct recall)</option>
                                <option value="2nd order (clinical presentation --> mechanism/Trait)">2nd order (clinical presentation --> mechanism/Trait)</option>
                                <option value="3rd order (clinical presentation --> diagnosis --> treatment)">3rd order (clinical presentation --> diagnosis --> treatment)</option>
                            </select>
                        </div>
                    </div>

                    <button id="generateBtn" class="w-full bg-red-600 hover:bg-red-700 text-white font-medium py-3 rounded-lg shadow-sm transition-colors flex items-center justify-center">
                        <i class="fas fa-magic mr-2"></i> <span id="btnText">Generate Questions</span>
                    </button>
                    
                    <div id="errorMsg" class="hidden mt-2 p-3 bg-red-50 text-red-700 text-sm rounded-lg border border-red-200">
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="lg:col-span-8">
            <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-100 min-h-[500px]">
                <div id="loadingState" class="hidden text-center py-20 text-red-600 font-medium animate-pulse">Drafting content...</div>
                <div id="initialState" class="text-center py-20 text-gray-400">Please enter API Key and Generate.</div>
                <div id="questionsListContainer" class="hidden">
                    <h2 class="text-2xl font-bold text-gray-800 mb-6">Generated Content</h2>
                    <div id="questionsWrapper" class="space-y-8"></div>
                </div>
            </div>
        </div>
    </main>

    <footer class="max-w-7xl mx-auto px-4 py-8 mt-4 border-t border-gray-200">
        <p class="text-center text-gray-500 text-sm">
            2026 &copy; Baig AA and Team, University of Tabuk, Tabuk, Saudi Arabia
        </p>
    </footer>

    <script>
        const apiKeyInput = document.getElementById('apiKeyInput');
        const saveKeyBtn = document.getElementById('saveKeyBtn');
        const connStatus = document.getElementById('connectionStatus');

        // Check key on load
        if (localStorage.getItem('bme_api_key')) {
            apiKeyInput.value = localStorage.getItem('bme_api_key');
            connStatus.classList.remove('bg-red-400');
            connStatus.classList.add('bg-green-500');
        }

        saveKeyBtn.addEventListener('click', () => {
            if (apiKeyInput.value) {
                localStorage.setItem('bme_api_key', apiKeyInput.value.trim());
                connStatus.classList.remove('bg-red-400');
                connStatus.classList.add('bg-green-500');
                saveKeyBtn.textContent = 'Saved!';
                setTimeout(() => saveKeyBtn.textContent = 'Save', 2000);
            }
        });

        const els = {
            subject: document.getElementById('subjectSelect'),
            topic: document.getElementById('topicInput'),
            mode: document.getElementById('modeSelect'),
            level: document.getElementById('levelSelect'),
            generateBtn: document.getElementById('generateBtn'),
            btnText: document.getElementById('btnText'),
            errorMsg: document.getElementById('errorMsg'),
            initialState: document.getElementById('initialState'),
            loadingState: document.getElementById('loadingState'),
            questionsListContainer: document.getElementById('questionsListContainer'),
            questionsWrapper: document.getElementById('questionsWrapper')
        };

        function copyText(text, btn) {
            const textarea = document.createElement("textarea");
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand("copy");
            document.body.removeChild(textarea);
            
            const original = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check"></i>';
            setTimeout(() => btn.innerHTML = original, 2000);
        }

        async function startCountdown(seconds) {
            els.generateBtn.disabled = true;
            let remaining = seconds;
            const originalText = els.btnText.textContent;
            
            const timer = setInterval(() => {
                remaining--;
                els.btnText.textContent = `Retry in ${remaining}s`;
                if (remaining <= 0) {
                    clearInterval(timer);
                    els.generateBtn.disabled = false;
                    els.btnText.textContent = originalText;
                }
            }, 1000);
        }

        async function generateQuestionsBatch() {
            const apiKey = localStorage.getItem('bme_api_key');
            if (!apiKey) { els.errorMsg.textContent = "API Key required."; els.errorMsg.classList.remove('hidden'); return; }

            els.errorMsg.classList.add('hidden');
            els.initialState.classList.add('hidden');
            els.questionsListContainer.classList.add('hidden');
            els.loadingState.classList.remove('hidden');

            const promptText = `Generate 5 high-yield medical questions for: ${els.topic.value} (Subject: ${els.subject.value}). 
            Level: ${els.level.value}. Mode: ${els.mode.value}. 
            Return ONLY raw valid JSON: 
            ${els.mode.value === 'OBA' ? '{"questions": [{"vignette": "...", "correctAnswer": "A", "options": [{"letter": "A", "text": "..."}, {"letter": "B", "text": "..."}, {"letter": "C", "text": "..."}, {"letter": "D", "text": "..."}, {"letter": "E", "text": "..."}], "explanations": [{"letter": "A", "explanation": "..."}, {"letter": "B", "explanation": "..."}, {"letter": "C", "explanation": "..."}, {"letter": "D", "explanation": "..."}, {"letter": "E", "explanation": "..."}]}]}' : '{"questions": [{"vignette": "...", "answerScheme": [{"subQuestion": "a.", "modelAnswer": "...", "mustAnswer": ["key1", "key2"]}, {"subQuestion": "b.", "modelAnswer": "...", "mustAnswer": ["key1", "key2"]}, {"subQuestion": "c.", "modelAnswer": "...", "mustAnswer": ["key1", "key2"]}]}]}'}. 
            For OBA, provide 5 options (A-E) and explanations for ALL options. 
            For SEQ, provide at least three sub-questions labeled a, b, and c with model answers and must-answer keywords. No extra text.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
                });

                const result = await response.json();
                
                if (result.error && result.error.code === 429) {
                    throw new Error("Quota exceeded. Please wait 60 seconds.");
                }

                if (!result.candidates || !result.candidates[0]?.content?.parts?.[0]?.text) {
                    throw new Error("API returned no valid content.");
                }

                const rawText = result.candidates[0].content.parts[0].text;
                const jsonMatch = rawText.match(/\{[\s\S]*\}/);
                if (!jsonMatch) throw new Error("Could not extract JSON from AI response.");
                
                const data = JSON.parse(jsonMatch[0]);
                render(data.questions, els.mode.value);
            } catch (error) {
                els.loadingState.classList.add('hidden');
                els.errorMsg.textContent = "⚠️ " + error.message;
                els.errorMsg.classList.remove('hidden');
                
                if (error.message.includes("Quota exceeded")) {
                    startCountdown(60);
                }
            }
        }

        function render(questions, mode) {
            els.loadingState.classList.add('hidden');
            els.questionsListContainer.classList.remove('hidden');
            els.questionsWrapper.innerHTML = questions.map((q, i) => {
                let contentText = `Q${i+1}: ${q.vignette}\n\n`;
                if (mode === 'OBA') {
                    contentText += q.options.map(o => `${o.letter}. ${o.text} (Explanation: ${q.explanations.find(e => e.letter === o.letter)?.explanation || "N/A"})`).join('\n');
                } else {
                    contentText += q.answerScheme.map(as => `${as.subQuestion} ${as.modelAnswer}\nKeywords: ${as.mustAnswer.join(', ')}`).join('\n\n');
                }

                return `
                <div class="border p-6 rounded-lg bg-white shadow-sm relative">
                    <button onclick="copyText(\`${contentText.replace(/"/g, '\\"')}\`, this)" class="absolute top-4 right-4 text-gray-400 hover:text-red-600 transition-colors">
                        <i class="fas fa-copy"></i>
                    </button>
                    <p class="font-bold text-gray-800 mb-4 pr-8">Q${i+1}: ${q.vignette}</p>
                    <div class="space-y-3">
                        ${mode === 'OBA' ? q.options.map(o => {
                            const isCorrect = o.letter === q.correctAnswer;
                            const explanation = q.explanations.find(e => e.letter === o.letter)?.explanation || "No explanation provided.";
                            return `
                                <div class="p-4 border rounded-lg ${isCorrect ? 'bg-green-50 border-green-500 shadow-sm' : 'bg-gray-50 border-gray-200'}">
                                    <div class="flex items-start">
                                        <span class="font-bold mr-2 ${isCorrect ? 'text-green-700' : 'text-gray-600'}">${o.letter}.</span>
                                        <div class="flex-1">
                                            <p class="${isCorrect ? 'font-semibold text-green-900' : 'text-gray-700'}">${o.text}</p>
                                            <div class="mt-2 text-sm text-gray-600 border-t pt-2 border-gray-200/50">
                                                <span class="font-semibold text-xs uppercase tracking-wider ${isCorrect ? 'text-green-700' : 'text-gray-500'}">Explanation:</span> 
                                                ${explanation}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            `;
                        }).join('') : q.answerScheme.map(as => `
                            <div class="mb-4 p-4 bg-gray-50 rounded border border-gray-200">
                                <p class="font-semibold text-gray-800 mb-2">${as.subQuestion}</p>
                                <p class="text-sm text-gray-700 mb-3">${as.modelAnswer}</p>
                                <div class="mt-2 pt-2 border-t border-gray-200">
                                    <span class="font-bold text-red-600 text-xs uppercase tracking-wider">Must include keywords:</span>
                                    <div class="flex flex-wrap gap-2 mt-2">
                                        ${as.mustAnswer.map(ma => `<span class="inline-block bg-yellow-100 text-yellow-800 text-xs font-medium px-2.5 py-0.5 rounded border border-yellow-200">${ma}</span>`).join('')}
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `}).join('');
        }

        els.generateBtn.addEventListener('click', generateQuestionsBatch);
    </script>
</body>
</html>
